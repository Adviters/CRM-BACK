name: Pipeline

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop
  schedule:
    - cron: '0 6 * * 1'

concurrency:
  group: pipeline-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read
  packages: read

jobs:
  build-and-test:
    name: Lint and build
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm exec eslint "src/**/*.ts"

      - name: Build project
        run: pnpm run build

  analyze:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'

  deploy:
    name: Deploy back to VM
    needs:
      - build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Pull and rebuild
        run: |
          set -euo pipefail
          cd /home/user/apps/CRM-BACK
          git fetch origin
          git checkout master
          git pull origin master
          docker compose up -d --build
