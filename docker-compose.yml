services:
  postgres:
    image: postgres:16-alpine
    container_name: petshop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-petshop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-petshop}
      POSTGRES_DB: ${POSTGRES_DB:-petshop}
    ports:
      # Bound to localhost only: not reachable from other machines.
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-petshop} -d ${POSTGRES_DB:-petshop}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: petshop-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-petshop}:${POSTGRES_PASSWORD:-petshop}@postgres:5432/${POSTGRES_DB:-petshop}?schema=public
    ports:
      - '${PORT:-3000}:3000'

volumes:
  postgres_data:
